<!--
  CEILINGS R US — "Before / After: Violation to Inspection-Ready"
  Place this directly BELOW the logo scroll (where "Why Businesses Trust" was).
  Matched pair: same ceiling, mold (Code 36) -> cleaned.
-->

<style>
.cru-ba-section { background:#ffffff; padding:72px 20px; font-family:'Open Sans',Arial,sans-serif; }
.cru-ba-inner { max-width:1100px; margin:0 auto; }
.cru-ba-header { text-align:center; margin-bottom:44px; }
.cru-ba-eyebrow {
  display:inline-block; background:#116782; color:#fff;
  font-size:0.72rem; font-weight:700; letter-spacing:2px; text-transform:uppercase;
  padding:5px 14px; border-radius:50px; margin-bottom:14px;
}
.cru-ba-header h2 { font-size:2rem; font-weight:800; color:#0f2d36; margin:0 0 12px; line-height:1.2; }
.cru-ba-header p { font-size:1rem; color:#5a7580; max-width:560px; margin:0 auto; line-height:1.6; }
.cru-ba-grid { display:grid; grid-template-columns:1fr 1fr; gap:28px; align-items:stretch; }
@media (max-width:700px){ .cru-ba-grid{grid-template-columns:1fr;} .cru-ba-header h2{font-size:1.5rem;} }
.cru-ba-card {
  margin:0; position:relative; border-radius:16px; overflow:hidden;
  box-shadow:0 4px 24px rgba(17,103,130,0.12); background:#f4f8f9;
}
.cru-ba-imgwrap { position:relative; aspect-ratio:4 / 3; overflow:hidden; }
.cru-ba-imgwrap img { width:100%; height:100%; object-fit:cover; display:block; }
.cru-ba-label {
  position:absolute; top:14px; left:14px; z-index:2;
  font-size:0.74rem; font-weight:800; letter-spacing:1.5px; text-transform:uppercase;
  padding:6px 14px; border-radius:50px;
}
.cru-ba-label.before { background:#dc2626; color:#fff; }
.cru-ba-label.after  { background:#5eff00; color:#0f2d36; }
.cru-ba-callout {
  position:absolute; left:0; right:0; bottom:0; z-index:2;
  display:flex; align-items:center; gap:8px;
  font-size:0.82rem; font-weight:700; color:#fff;
  padding:12px 16px;
}
.cru-ba-callout.flag    { background:linear-gradient(to top, rgba(153,27,27,0.92), rgba(153,27,27,0)); }
.cru-ba-callout.cleared { background:linear-gradient(to top, rgba(13,82,105,0.92), rgba(13,82,105,0)); }
.cru-ba-callout .ic { font-size:1rem; }
</style>

<section class="cru-ba-section">
  <div class="cru-ba-inner">

    <div class="cru-ba-header">
      <div class="cru-ba-eyebrow">See The Difference</div>
      <h2>From Violation to Inspection-Ready</h2>
      <p>The same South Florida kitchen ceiling — what an inspector would flag, and how we leave it.</p>
    </div>

    <div class="cru-ba-grid">

      <figure class="cru-ba-card">
        <div class="cru-ba-imgwrap">
          <span class="cru-ba-label before">Before</span>
          <img src="https://ceilingsrus.net/wp-content/uploads/2026/06/IMG_3717-scaled.jpeg" alt="Moldy ceiling tiles before cleaning — a Code 36 violation">
          <div class="cru-ba-callout flag"><span class="ic">⚠</span> Inspector Flag: Code 36 — Mold &amp; Mildew</div>
        </div>
      </figure>

      <figure class="cru-ba-card">
        <div class="cru-ba-imgwrap">
          <span class="cru-ba-label after">After</span>
          <img src="https://ceilingsrus.net/wp-content/uploads/2026/06/IMG_3851-scaled.jpeg" alt="Same ceiling after professional cleaning — inspection-ready">
          <div class="cru-ba-callout cleared"><span class="ic">✓</span> Cleaned &amp; Inspection-Ready</div>
        </div>
      </figure>

    </div>

  </div>
</section>
